name: CI/CD data preprocessing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TRAIN_DATA_URL: "coffeebeans_raw/train"
  TEST_DATA_URL: "coffeebeans_raw/test"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # Check Env Variables
      - name: Check Env
        run: |
          echo $TRAIN_DATA_URL
          echo $TEST_DATA_URL
      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tensorflow numpy pillow
          
      # Run as a mlflow project
      - name: Run preprocessing script
        run: |
          cd preprocessing
          run automate_Faqihuddin-Al-Ghiffary
